<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng công bố nhiệm vụ - Cục Phát triển DNNN</title>
<style>
  :root{
    --navy:#1f3864; --navy2:#2e5496; --ink:#1a2233; --muted:#5b6472;
    --bg:#eef1f7; --card:#ffffff; --line:#e5e8f0;
    --done:#2f9e55; --done-tx:#1e6b34;
    --con:#f4c430; --con-tx:#9a7a00;
    --sap:#ec8a1c; --sap-tx:#b5610a;
    --qua:#d5372f; --qua-tx:#b02a22;
    --gold:#b8860b; --gold-bg:#f7eecb;
    --done-bg:#e4f5ea; --con-bg:#fdf5d3; --sap-bg:#fcefd8; --qua-bg:#fbe2e0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Times New Roman","Segoe UI",serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column}
  header{height:12vh;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 2.2vw;gap:2vw}
  .hl{display:flex;align-items:center;gap:1.4vw}
  .emblem{width:9vh;height:9vh;flex:0 0 auto;object-fit:contain}
  .htitle small{display:block;font-size:1.7vh;letter-spacing:.5px;opacity:.9}
  .htitle h1{font-size:3vh;font-weight:700;line-height:1.1;margin-top:.3vh}
  .hr{text-align:right}
  .hr .d{font-size:2.5vh;font-weight:700}
  .hr .a{font-size:1.6vh;opacity:.9;margin-top:.4vh}
  .hr .per{font-size:1.55vh;font-weight:700;margin-top:.5vh;display:inline-block;background:rgba(255,255,255,.16);padding:.3vh 1vw;border-radius:1vh}
  .stage{flex:1;position:relative}
  .slide{position:absolute;inset:0;padding:2.2vh 2.2vw 1vh;display:none;flex-direction:column}
  .slide.on{display:flex}
  .stitle{font-size:2.6vh;font-weight:700;color:var(--navy);margin-bottom:1.4vh;display:flex;align-items:center;gap:1vw}
  .stitle .bar{width:.8vw;height:3vh;border-radius:3px;background:var(--navy)}
  .stitle.prio .bar{background:var(--gold)} .stitle.prio{color:#8a6200}
  .stitle .rt{margin-left:auto;font-size:1.9vh;font-weight:400;color:var(--muted)}
  .kpis{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr 1fr;gap:1.2vw}
  .kpi{background:var(--card);border-radius:1.2vh;padding:1.6vh 1.4vw;box-shadow:0 .5vh 1.6vh rgba(20,30,60,.08);border-top:.7vh solid var(--navy);position:relative}
  .kpi .lab{font-size:1.9vh;color:var(--muted);font-weight:600}
  .kpi .num{font-size:6.6vh;font-weight:800;line-height:1;margin-top:.6vh}
  .kpi .sub{font-size:1.5vh;color:var(--muted);margin-top:.4vh}
  .kpi.total .num{color:var(--navy)}
  .kpi.done{border-top-color:var(--done)} .kpi.done .num{color:var(--done-tx)}
  .kpi.con{border-top-color:var(--con)} .kpi.con .num{color:var(--con-tx)}
  .kpi.sap{border-top-color:var(--sap)} .kpi.sap .num{color:var(--sap-tx)}
  .kpi.qua{border-top-color:var(--qua)} .kpi.qua .num{color:var(--qua-tx)}
  .ring{--p:0;width:11vh;height:11vh;border-radius:50%;position:absolute;top:1.4vh;right:1vw;background:conic-gradient(var(--done) calc(var(--p)*1%), #e6e9f1 0);display:flex;align-items:center;justify-content:center}
  .ring::before{content:"";position:absolute;width:8vh;height:8vh;background:#fff;border-radius:50%}
  .ring span{position:relative;font-size:2.5vh;font-weight:800;color:var(--done-tx)}
  .panel{background:var(--card);border-radius:1.2vh;padding:1.8vh 1.6vw;margin-top:1.6vh;box-shadow:0 .5vh 1.6vh rgba(20,30,60,.08);flex:1;display:flex;flex-direction:column}
  .panel h3{font-size:2.1vh;color:var(--navy);border-bottom:.25vh solid var(--line);padding-bottom:.8vh;margin-bottom:1.2vh}
  .bwrap{flex:1;display:flex;flex-direction:column;justify-content:space-around}
  .barrow{display:grid;grid-template-columns:16vw 1fr 4vw;align-items:center;gap:1vw}
  .barrow .pn{font-size:2.2vh;font-weight:700;display:flex;align-items:center;gap:.5vw}
  .barrow .pn small{display:block;font-weight:400;font-size:1.5vh;color:var(--muted)}
  .barrow .pn .fire{color:var(--gold);font-size:1.9vh}
  .track{height:3.4vh;border-radius:.6vh;background:#eef0f5;display:flex;overflow:hidden}
  .track i{height:100%}
  .seg-done{background:var(--done)} .seg-con{background:var(--con)} .seg-sap{background:var(--sap)} .seg-qua{background:var(--qua)}
  .barrow .tot{font-size:2.4vh;font-weight:800;text-align:right;color:var(--navy)}
  .legend{display:flex;gap:1.6vw;flex-wrap:wrap;margin-top:1.2vh;font-size:1.7vh;color:var(--muted)}
  .legend b{display:inline-block;width:1.6vh;height:1.6vh;border-radius:3px;margin-right:.5vw;vertical-align:-.2vh}
  .prio-line{display:flex;gap:1vw;margin-bottom:1.2vh}
  .prio-line span{background:var(--gold-bg);border:1px solid #e2cf92;border-radius:2vh;padding:.5vh 1.2vw;font-size:1.9vh;color:#8a6200;font-weight:700}
  .dtable{flex:1;background:var(--card);border-radius:1.2vh;overflow:hidden;box-shadow:0 .5vh 1.6vh rgba(20,30,60,.08);display:flex;flex-direction:column}
  .drow{display:grid;grid-template-columns:3.5vw 1fr 6vw 12vw 9.5vw 10vw 11vw;align-items:center;gap:1vw;padding:1vh 1.4vw;border-bottom:1px solid var(--line);flex-shrink:0}
  .drow.head{background:var(--navy);color:#fff;flex:0 0 6vh;height:6vh;padding:0 1.4vw;font-weight:700;font-size:1.9vh}
  .dtable .drow:last-child{border-bottom:none}
  .stitle.warn .bar{background:var(--qua)} .stitle.warn{color:var(--qua-tx)}
  .rkhead{display:flex;gap:1.4vw;margin-bottom:1.4vh}
  .rkhead .box{flex:1;background:var(--card);border-radius:1.2vh;padding:1.4vh 1.4vw;box-shadow:0 .5vh 1.6vh rgba(20,30,60,.08);border-top:.7vh solid var(--qua)}
  .rkhead .box.sap{border-top-color:var(--sap)} .rkhead .box.nohan{border-top-color:#8a94a6}
  .rkhead .box .lab{font-size:1.9vh;color:var(--muted);font-weight:600}
  .rkhead .box .num{font-size:5.4vh;font-weight:800;line-height:1;margin-top:.4vh}
  .rkhead .box.qua .num{color:var(--qua-tx)} .rkhead .box.sap .num{color:var(--sap-tx)} .rkhead .box.nohan .num{color:#5b6472}
  .rktable{flex:1;display:flex;flex-direction:column;gap:.7vh}
  .rkrow{display:grid;grid-template-columns:7vw 1fr 14vw 14vw 12vw;align-items:center;gap:1vw;padding:0 1.6vw;border-radius:1vh;background:var(--card);box-shadow:0 .3vh 1vh rgba(20,30,60,.06);flex:1}
  .rkrow.head{background:var(--navy);color:#fff;flex:0 0 5.5vh;font-weight:700;font-size:1.9vh;box-shadow:none}
  .rkrow .rank{font-size:2.8vh;font-weight:800;text-align:center;color:var(--navy)}
  .rkrow .pn{font-size:2.4vh;font-weight:700}
  .rkrow .m{text-align:center;font-size:2.6vh;font-weight:800}
  .rkrow .m.q{color:var(--qua-tx)} .rkrow .m.s{color:var(--sap-tx)}
  .rkrow.alert{background:#fdeceb} .rkrow.warn{background:#fdf6ea}
  /* ============ CHẾ ĐỘ BÁO CÁO (mobile / gửi mọi người) ============ */
  html.report{height:auto;overflow:visible}
  body.report{height:auto;min-height:100%;overflow:visible;display:block;background:var(--bg)}
  body.report header{height:auto;padding:12px 16px;position:static;gap:12px}
  body.report .emblem{width:42px;height:42px}
  body.report .htitle small{font-size:10px;letter-spacing:.2px}
  body.report .htitle h1{font-size:15px;margin-top:2px}
  body.report .hr .d{font-size:13px} body.report .hr .a{font-size:9.5px} body.report .hr .per{font-size:10px;padding:2px 8px}
  body.report .stage,body.report .slide{position:static;inset:auto;height:auto;overflow:visible;display:block;padding:0}
  body.report footer,body.report .pbar{display:none}
  .rp{max-width:760px;margin:0 auto;padding:12px 12px 40px}
  .rp .nav{position:sticky;top:66px;z-index:8;display:flex;gap:8px;padding:8px 0;background:var(--bg)}
  .rp .nav a{flex:1;text-align:center;text-decoration:none;font-size:12.5px;font-weight:700;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 6px}
  .rp h2{font-size:15px;color:var(--navy);margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
  .rp h2 .bar{width:5px;height:18px;border-radius:3px;background:var(--navy)}
  .rp h2.warn{color:var(--qua-tx)} .rp h2.warn .bar{background:var(--qua)}
  .rp .updated{font-size:11.5px;color:var(--muted);margin:2px 2px 0}
  .rp .kpis2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .rp .k{background:#fff;border-radius:12px;padding:11px 13px;box-shadow:0 2px 10px rgba(20,30,60,.06);border-left:4px solid var(--navy)}
  .rp .k.done{border-left-color:var(--done)} .rp .k.con{border-left-color:var(--con)} .rp .k.sap{border-left-color:var(--sap)} .rp .k.qua{border-left-color:var(--qua)} .rp .k.nohan{border-left-color:#8a94a6}
  .rp .k .lab{font-size:11.5px;color:var(--muted);font-weight:600}
  .rp .k .num{font-size:28px;font-weight:800;line-height:1.15;margin-top:2px}
  .rp .k.total .num{color:var(--navy)} .rp .k.done .num{color:var(--done-tx)} .rp .k.con .num{color:var(--con-tx)} .rp .k.sap .num{color:var(--sap-tx)} .rp .k.qua .num{color:var(--qua-tx)} .rp .k.nohan .num{color:#5b6472}
  .rp .rkline{display:flex;gap:10px;margin-bottom:10px}
  .rp .rkline .b{flex:1;background:#fff;border-radius:12px;padding:10px 12px;box-shadow:0 2px 10px rgba(20,30,60,.06);border-top:4px solid var(--qua)}
  .rp .rkline .b.s{border-top-color:var(--sap)} .rp .rkline .b.n{border-top-color:#8a94a6}
  .rp .rkline .b .lab{font-size:10.5px;color:var(--muted);font-weight:600} .rp .rkline .b .num{font-size:24px;font-weight:800}
  .rp .rkline .b.q .num{color:var(--qua-tx)} .rp .rkline .b.s .num{color:var(--sap-tx)} .rp .rkline .b.n .num{color:#5b6472}
  .rp .rrow{display:grid;grid-template-columns:26px 1fr 52px 52px;gap:8px;align-items:center;background:#fff;border-radius:10px;padding:9px 12px;margin-bottom:6px;box-shadow:0 1px 6px rgba(20,30,60,.05)}
  .rp .rrow.alert{background:#fdeceb} .rp .rrow.warn{background:#fdf6ea}
  .rp .rrow .rk{font-weight:800;color:var(--navy);text-align:center}
  .rp .rrow .pn{font-weight:700;font-size:13.5px}
  .rp .rrow .m{text-align:center;font-weight:800;font-size:16px}
  .rp .rrow .m.q{color:var(--qua-tx)} .rp .rrow .m.s{color:var(--sap-tx)}
  .rp .rhd{display:grid;grid-template-columns:26px 1fr 52px 52px;gap:8px;padding:2px 12px 4px;font-size:10.5px;color:var(--muted);font-weight:700}
  .rp .rhd .m{text-align:center}
  .rp .card{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:9px;box-shadow:0 2px 10px rgba(20,30,60,.06);border-left:4px solid var(--qua)}
  .rp .card.sap{border-left-color:var(--sap)} .rp .card.con{border-left-color:#c3ccdb}
  .rp .card .tt{font-weight:700;font-size:14px;line-height:1.32}
  .rp .card .meta{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:8px;font-size:12px;color:var(--muted)}
  .rp .card .meta b{color:var(--ink);font-weight:700}
  .rp .card .chips{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center}
  .rp .card .chips .src{font-size:11px;font-weight:800;color:#fff;padding:3px 8px;border-radius:6px}
  .rp .card .chips .st{font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px}
  .rp .note{font-size:12.5px;color:var(--qua-tx);font-weight:700;background:#fdeceb;border-radius:10px;padding:10px 12px;margin-top:10px}
  .rp .empty{background:#fff;border-radius:12px;padding:18px;text-align:center;color:var(--muted);font-size:13.5px}
  @media (min-width:560px){ .rp .kpis2{grid-template-columns:repeat(3,1fr)} }
  /* thanh lọc bản điện thoại */
  .rp .fbar{position:sticky;top:0;z-index:8;background:var(--bg);padding:8px 0 8px;display:flex;flex-direction:column;gap:8px;border-bottom:1px solid var(--line)}
  .rp .frow{display:flex;gap:8px}
  .rp .frow select{flex:1;min-width:0;font-size:13px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font-family:inherit}
  .rp .chips2{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .rp .fchip{flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--navy);background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 12px;white-space:nowrap;cursor:pointer}
  .rp .fchip.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .rp .fbar input{font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-family:inherit;width:100%}
  .rp .cnt{font-size:12.5px;color:var(--muted);margin:2px 2px 0;font-weight:600}
  .drow .c{font-size:2.15vh}
  .drow .stt{font-weight:700;color:var(--muted);text-align:center;font-size:2vh}
  .drow.head>*{align-self:center}
  .drow.head .stt{color:#fff;font-size:1.9vh}
  .drow .ten{font-weight:700;line-height:1.15}
  .drow .ten small{display:block;font-weight:400;font-size:1.5vh;color:var(--muted)}
  .drow .ph{text-align:center;font-weight:700}
  .drow .ldc{font-size:1.85vh;font-weight:600;line-height:1.15}
  .badge{display:inline-block;font-size:1.5vh;font-weight:800;padding:.4vh .7vw;border-radius:.6vh;color:#fff}
  .b-TW,.b-QH,.b-TTg,.b-CP{background:var(--gold)} .b-Bo,.b-PL,.b-DN,.b-DP{background:var(--navy2)} .b-PH,.b-Khac{background:#8a94a6}
  .hancell{text-align:center;font-weight:700;font-size:2vh}
  .stbadge{display:inline-block;font-size:1.8vh;font-weight:800;padding:.5vh .8vw;border-radius:.6vh}
  .st-done{background:var(--done-bg);color:var(--done-tx)} .st-con{background:var(--con-bg);color:var(--con-tx)}
  .st-sap{background:var(--sap-bg);color:var(--sap-tx)} .st-qua{background:var(--qua-bg);color:var(--qua-tx)}
  .drow.r-qua{background:#fdf1f0} .drow.r-sap{background:#fdf7ee}
  footer{height:5vh;display:flex;align-items:center;justify-content:space-between;padding:0 2.2vw;background:#e3e7f0;color:var(--muted);font-size:1.6vh}
  .dots{display:flex;gap:.7vw;align-items:center}
  .dot{width:1.3vh;height:1.3vh;border-radius:50%;background:#b7c0d0}
  .dot.on{background:var(--navy);transform:scale(1.25)}
  .pbar{position:absolute;left:0;bottom:0;height:.5vh;background:var(--navy2);width:0%}
  .msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2vh;color:var(--muted);font-size:2.6vh}
  .msg .sp{font-size:2vh}
  .fresh{font-size:1.4vh;opacity:.75}
</style>
</head>
<body>
  <header>
    <div class="hl"><img class="emblem" src="logo.png" alt="Bộ Tài chính" onerror="this.style.visibility='hidden'">
      <div class="htitle"><small>BỘ TÀI CHÍNH · CỤC PHÁT TRIỂN DOANH NGHIỆP NHÀ NƯỚC</small>
      <h1>THEO DÕI TIẾN ĐỘ THỰC HIỆN NHIỆM VỤ CỦA CÁC PHÒNG</h1></div></div>
    <div class="hr"><div class="d" id="hdate">—</div><div class="a" id="hasof">—</div><div class="per" id="hper"></div></div>
  </header>
  <div class="stage" id="stage"><div class="msg" id="msg">Đang tải dữ liệu…<div class="sp" id="msgsub"></div></div></div>
  <footer>
    <div id="fleft">Bảng công bố tại sảnh · tự động luân phiên trang</div>
    <div class="dots" id="dots"></div>
    <div id="fright"><span class="fresh" id="fresh"></span></div>
  </footer>
  <div class="pbar" id="pbar"></div>

<script>
/* ============================================================
   CẤU HÌNH – chỉ cần sửa vài dòng dưới đây
   DATA_URL: đường dẫn dữ liệu (CSV hoặc JSON).
     - Google Sheet: dán link CSV đã "Xuất bản lên web" của trang dữ liệu.
     - Hoặc để "data.csv" nếu đặt tệp dữ liệu cùng thư mục trên server.
   ============================================================ */
const CONFIG = {
  DATA_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkYPm0ujKqLrohQEu7A577uAQDHb4r52eq_rtdv8RJU7uei2qyDB6cO1O__Ug9TtmeDlESxSSfCSUA/pub?gid=760938962&single=true&output=csv",
  REFRESH_MINUTES: 5,     // tự đọc lại dữ liệu mỗi 5 phút
  SLIDE_SECONDS: 20,      // thời gian mỗi trang
  ROWS_PER_PAGE: 7,       // số nhiệm vụ mỗi trang danh mục
  WARN_DAYS: 5,           // còn ≤ số ngày này → cảnh báo "Sắp đến hạn"
  REF_DATE: null,          // null = dùng ngày thực; hoặc "2026-07-13" để cố định khi thử
  PERIOD_MODE: "month",    // "month" = tự hiện Tháng M/YYYY · "quarter" = tự hiện Quý N/YYYY · "custom" = dùng PERIOD_LABEL
  PERIOD_LABEL: "",        // chỉ dùng khi PERIOD_MODE = "custom", ví dụ "6 tháng đầu năm 2026"
  COUNT_DONE_IN_PERIOD: true, // true = chỉ tính việc ĐÃ HOÀN THÀNH trong kỳ đang theo dõi (việc chưa xong luôn hiển thị) · false = tính mọi việc đã hoàn thành
  DETAIL_SCOPE: "urgent",     // "urgent" = danh mục chi tiết chỉ hiện việc QUÁ HẠN + SẮP ĐẾN HẠN (khuyến nghị) · "open" = mọi việc chưa xong
  MAX_DETAIL_PAGES: 6,        // giới hạn tối đa số trang danh mục chi tiết (0 = không giới hạn); phần dôi gộp thành "và N việc khác"
  SHOW_RANKING: true,         // true = hiện slide "Bảng xếp hạng đôn đốc theo Phòng"
  HIDE_NGUON_DETAIL: ["PH"]   // các nguồn KHÔNG đưa vào danh mục đôn đốc (PH = Phối hợp). Thêm mã nguồn khác nếu muốn ẩn tiếp.
};

const PHONG_TEN={VP:"Văn phòng",CSTH:"Phòng Chính sách tổng hợp",SXĐM:"Phòng Sắp xếp đổi mới","ĐDCSH":"Phòng Đại diện chủ sở hữu",NV1:"Phòng Nghiệp vụ 1",NV2:"Phòng Nghiệp vụ 2",NV3:"Phòng Nghiệp vụ 3",NV4:"Phòng Nghiệp vụ 4",NV5:"Phòng Nghiệp vụ 5"};
const PHONG_ORDER=["VP","CSTH","SXĐM","ĐDCSH","NV1","NV2","NV3","NV4","NV5"];
const NGUON={TW:{ten:"Trung ương",tier:"cao"},QH:{ten:"Quốc hội",tier:"cao"},TTg:{ten:"Thủ tướng Chính phủ",tier:"cao"},CP:{ten:"Chính phủ",tier:"cao"},Bo:{ten:"Bộ giao",tier:"uutien"},PH:{ten:"Phối hợp",tier:"thuong"},PL:{ten:"Theo QĐ pháp luật",tier:"uutien"},DN:{ten:"Doanh nghiệp",tier:"uutien"},DP:{ten:"Địa phương/Bộ ngành",tier:"uutien"},Khac:{ten:"Khác",tier:"thuong"}};
const TIER_RANK={cao:0,uutien:1,thuong:2};
const LABELS={done:"Đã hoàn thành",con:"Còn hạn",sap:"Sắp đến hạn",qua:"Quá hạn"};
const STORDER={qua:0,sap:1,con:2,done:3};

function today(){const d=CONFIG.REF_DATE?new Date(CONFIG.REF_DATE+"T00:00:00"):new Date();d.setHours(0,0,0,0);return d;}
function parseD(s){if(!s)return null;s=(""+s).trim();
  let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/); if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(s); return isNaN(d)?null:d;}
function daysLeft(t){const d=t._han; if(!d)return null; const x=Math.round((d-today())/86400000); return x;}
function statusOf(t){if(t._done)return "done";const dl=daysLeft(t);if(dl===null)return "con";if(dl<0)return "qua";if(dl<=CONFIG.WARN_DAYS)return "sap";return "con";}
function tierOf(t){return NGUON[t.nguon]?NGUON[t.nguon].tier:"thuong";}
function counts(list){const c={done:0,con:0,sap:0,qua:0};list.forEach(t=>c[statusOf(t)]++);return c;}
/* ---- lọc theo kỳ: giữ mọi việc CHƯA hoàn thành + việc ĐÃ hoàn thành trong kỳ ---- */
function periodRange(){const d=today(),y=d.getFullYear(),m=d.getMonth();
  if(CONFIG.PERIOD_MODE==="custom")return null;                 // custom: không lọc theo ngày
  if(CONFIG.PERIOD_MODE==="quarter"){const q=Math.floor(m/3);return [new Date(y,q*3,1),new Date(y,q*3+3,0)];}
  return [new Date(y,m,1),new Date(y,m+1,0)];                   // month
}
function doneInPeriod(t){const r=periodRange();if(!r)return true;
  if(!t._hoanthanh)return true;                                // đã hoàn thành nhưng chưa nhập ngày → vẫn tính (khớp với sheet Tổng hợp)
  return t._hoanthanh>=r[0]&&t._hoanthanh<=r[1];}
function visibleTasks(tasks){if(!CONFIG.COUNT_DONE_IN_PERIOD)return tasks;
  return tasks.filter(t=>!t._done||doneInPeriod(t));}

function normNguon(s){s=(""+(s||"")).trim();
  if(/^TW\b/i.test(s)||/Trung ương/i.test(s))return "TW";
  if(/^QH\b/i.test(s)||/Quốc hội/i.test(s))return "QH";
  if(/^TTg\b/i.test(s)||/Thủ tướng/i.test(s))return "TTg";   // kiểm tra trước "Chính phủ"
  if(/^CP\b/i.test(s)||/Chính phủ/i.test(s))return "CP";
  if(/^Bo\b/i.test(s)||/Bộ giao|Nhiệm vụ Bộ|Bộ Tài chính/i.test(s))return "Bo";
  if(/^PH\b/i.test(s)||/Phối hợp/i.test(s))return "PH";
  if(/^PL\b|^DK\b/i.test(s)||/pháp luật|quy định|Định kỳ|bất thường/i.test(s))return "PL";
  if(/^DN\b/i.test(s)||/Doanh nghiệp/i.test(s))return "DN";
  if(/^DP\b/i.test(s)||/Địa phương|Bộ ngành/i.test(s))return "DP";
  return "Khac";}
function nameOnly(s){return (""+(s||"")).replace(/\s*\([^)]*\)/g,"").trim();}   // bỏ phần (PCT)/(Cục trưởng), chỉ giữ tên
function isSecret(d){return /mật/i.test((""+(d||"")));}   // Mật / Tối mật / Tuyệt mật (Thường → không)
function normPhong(s){s=(""+(s||"")).trim().toUpperCase().replace(/\./g,"");
  const map={VP:"VP",CSTH:"CSTH","SXĐM":"SXĐM",SXDM:"SXĐM","ĐDCSH":"ĐDCSH",DDCSH:"ĐDCSH",NV1:"NV1",NV2:"NV2",NV3:"NV3",NV4:"NV4",NV5:"NV5"};
  return map[s]||s;}

/* ---- CSV parser (hỗ trợ dấu phẩy trong ô, ô có ngoặc kép) ---- */
function parseCSV(text){
  text=text.replace(/^﻿/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[];let row=[],f="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;}else q=false;} else f+=c; }
    else{ if(c==='"')q=true; else if(c===","){row.push(f);f="";} else if(c==="\n"){row.push(f);rows.push(row);row=[];f="";} else f+=c; }
  }
  if(f!==""||row.length){row.push(f);rows.push(row);}
  return rows.filter(r=>r.length&&r.some(x=>(""+x).trim()!==""));
}
function rowsToTasks(rows){
  if(!rows.length)return [];
  const head=rows[0].map(h=>(""+h).trim().toLowerCase());
  const idx=(names)=>{for(const n of names){const i=head.indexOf(n);if(i>=0)return i;}return -1;};
  const iTen=idx(["ten","tên nhiệm vụ","ten nhiem vu","nhiệm vụ","tennhiemvu"]);
  const iPh=idx(["phong","phòng","phòng chủ trì","phong chu tri"]);
  const iNg=idx(["nguon","cấp chỉ đạo","cap chi dao","nguồn","nguon nhiem vu"]);
  const iHan=idx(["han","thời hạn","thoi han","hạn","thời hạn hoàn thành"]);
  const iLd=idx(["ldcuc","lãnh đạo cục","lanh dao cuc","lãnh đạo cục phụ trách","lđ cục"]);
  const iDm=idx(["domat","độ mật","do mat","đọ mật","mật"]);
  const iTt=idx(["tinhtrang","tình trạng","tinh trang","trạng thái"]);
  const iTd=idx(["tiendo","tiến độ","tien do","tiến độ (%)","%"]);
  const iHt=idx(["ngayhoanthanh","ngày hoàn thành","ngay hoan thanh","ngày ht","ngayht"]);
  const out=[];
  for(let r=1;r<rows.length;r++){const row=rows[r];
    const ten=iTen>=0?(""+row[iTen]).trim():"";
    if(!ten)continue;
    const tt=iTt>=0?(""+row[iTt]).trim():"";
    out.push({ten:ten,phong:normPhong(iPh>=0?row[iPh]:""),nguon:normNguon(iNg>=0?row[iNg]:""),ldcuc:nameOnly(iLd>=0?row[iLd]:""),domat:iDm>=0?(""+row[iDm]).trim():"",
      han:iHan>=0?(""+row[iHan]).trim():"",tinhtrang:tt||"Đang thực hiện",
      td:iTd>=0?(parseInt((""+row[iTd]).replace(/[^0-9]/g,""))||0):0,
      _han:parseD(iHan>=0?row[iHan]:""),_hoanthanh:parseD(iHt>=0?row[iHt]:""),_done:/đã hoàn thành|hoan thanh|hoàn thành/i.test(tt)});
  }
  return out;
}
function jsonToTasks(arr){
  return (arr||[]).map(o=>{const tt=(o.tinhtrang||o.trangthai||"").trim();
    return {ten:(o.ten||o.tenNhiemVu||"").trim(),phong:normPhong(o.phong),nguon:normNguon(o.nguon),ldcuc:nameOnly(o.ldcuc),domat:(o.domat||o.domật||"").trim(),
      han:(o.han||"").trim(),tinhtrang:tt||"Đang thực hiện",td:parseInt(o.tiendo||o.td||0)||0,
      _han:parseD(o.han),_hoanthanh:parseD(o.ngayhoanthanh||o.hoanthanh),_done:/đã hoàn thành|hoan thanh|hoàn thành/i.test(tt)};}).filter(t=>t.ten);
}

/* ---- render pieces ---- */
const LEGEND=`<span><b style="background:var(--done)"></b>Đã hoàn thành</span><span><b style="background:var(--con)"></b>Còn hạn</span><span><b style="background:var(--sap)"></b>Sắp đến hạn</span><span><b style="background:var(--qua)"></b>Quá hạn</span>`;
function kpiHTML(list){const c=counts(list),total=list.length,rate=total?Math.round(c.done/total*100):0;
  return `<div class="kpis"><div class="kpi total"><div class="lab">TỔNG NHIỆM VỤ</div><div class="num">${total}</div><div class="sub">đang theo dõi</div></div>
   <div class="kpi done"><div class="lab">ĐÃ HOÀN THÀNH</div><div class="num">${c.done}</div><div class="ring" style="--p:${rate}"><span>${rate}%</span></div></div>
   <div class="kpi con"><div class="lab">CÒN HẠN</div><div class="num">${c.con}</div><div class="sub">đúng tiến độ</div></div>
   <div class="kpi sap"><div class="lab">SẮP ĐẾN HẠN</div><div class="num">${c.sap}</div><div class="sub">còn ≤ ${CONFIG.WARN_DAYS} ngày</div></div>
   <div class="kpi qua"><div class="lab">QUÁ HẠN</div><div class="num">${c.qua}</div><div class="sub">đôn đốc ngay</div></div></div>`;}
function barsHTML(list){return PHONG_ORDER.map(p=>{const items=list.filter(t=>t.phong===p);if(!items.length)return "";
  const s=counts(items),n=items.length;
  const seg=(k,cls)=>s[k]?`<i class="seg-${cls}" style="width:${s[k]/n*100}%"></i>`:"";
  return `<div class="barrow"><div class="pn">${PHONG_TEN[p]||p}</div><div class="track">${seg("done","done")}${seg("con","con")}${seg("sap","sap")}${seg("qua","qua")}</div><div class="tot">${n}</div></div>`;}).join("");}
const DHEAD=`<div class="drow head"><div style="text-align:center">TT</div><div>Tên nhiệm vụ</div><div style="text-align:center">Phòng</div><div style="text-align:center">Lãnh đạo Cục phụ trách</div><div style="text-align:center">Nguồn việc</div><div style="text-align:center">Thời hạn</div><div style="text-align:center">Trạng thái</div></div>`;
function detailRowHTML(t,num){const st=statusOf(t),dl=daysLeft(t);
  const when=st==="done"?"Hoàn thành":(st==="qua"?`Quá ${Math.abs(dl)} ngày`:(st==="sap"?(dl===0?"Hôm nay":`Còn ${dl} ngày`):(t._han?t._han.toLocaleDateString("vi-VN"):"—")));
  return `<div class="drow r-${st}"><div class="stt">${num}</div>`+
    `<div class="c ten">${t.ten}<small>Hạn: ${t._han?t._han.toLocaleDateString("vi-VN"):"—"} · ${t.tinhtrang}</small></div>`+
    `<div class="c ph">${t.phong}</div>`+
    `<div class="c ldc" style="text-align:center">${t.ldcuc||"—"}</div>`+
    `<div class="c" style="text-align:center"><span class="badge b-${t.nguon}">${(NGUON[t.nguon]||{}).ten||t.nguon}</span></div>`+
    `<div class="hancell">${when}</div>`+
    `<div class="c" style="text-align:center"><span class="stbadge st-${st}">${LABELS[st]}</span></div></div>`;}
/* Đo chiều cao thực của từng dòng rồi dồn tối đa số dòng vừa khít mỗi trang (dòng ngắn tự co lại) */
function packByHeight(rowHTMLs){
  const stage=document.getElementById("stage");if(!stage)return null;
  const W=stage.clientWidth,H=stage.clientHeight;if(!W||!H)return null;
  const box=document.createElement("div");
  box.style.cssText=`position:fixed;left:-99999px;top:0;width:${W}px;height:${H}px`;
  box.innerHTML=`<div class="slide on" style="position:static;height:100%"><div class="stitle"><span class="bar"></span>DANH MỤC NHIỆM VỤ CHI TIẾT<span class="rt">Trang 1/1</span></div><div class="dtable">${DHEAD}${rowHTMLs.join("")}</div></div>`;
  document.body.appendChild(box);
  const table=box.querySelector(".dtable");const els=[...table.querySelectorAll(".drow")];
  const headH=els[0].getBoundingClientRect().height;
  const avail=table.clientHeight-headH-10;   // chừa biên an toàn để không dòng nào bị cắt
  const hs=els.slice(1).map(el=>el.getBoundingClientRect().height);
  document.body.removeChild(box);
  if(avail<=0||!hs.length)return null;
  const pages=[];let cur=[],acc=0;
  hs.forEach((h,i)=>{if(cur.length&&acc+h>avail){pages.push(cur);cur=[];acc=0;}cur.push(i);acc+=h;});
  if(cur.length)pages.push(cur);
  return pages;
}
const EMPTYROW=`<div></div><div></div><div></div><div></div><div></div><div></div>`;
function detailPages(tasks){
  const urgent=CONFIG.DETAIL_SCOPE==="urgent";
  const TITLE=urgent?"NHIỆM VỤ QUAN TRỌNG & CẦN ĐÔN ĐỐC":"DANH MỤC NHIỆM VỤ CHI TIẾT";
  let pool=tasks.filter(t=>statusOf(t)!=="done"&&!isSecret(t.domat)&&!CONFIG.HIDE_NGUON_DETAIL.includes(t.nguon));
  if(urgent)pool=pool.filter(t=>{const st=statusOf(t);return st==="qua"||st==="sap"||tierOf(t)==="cao";});
  pool.sort((a,b)=>(STORDER[statusOf(a)]-STORDER[statusOf(b)])||(TIER_RANK[tierOf(a)]-TIER_RANK[tierOf(b)])||((daysLeft(a)??9999)-(daysLeft(b)??9999)));
  if(!pool.length){
    const msg=urgent?"Không có nhiệm vụ quan trọng, quá hạn hoặc sắp đến hạn cần đôn đốc.":"Chưa có nhiệm vụ nào.";
    return [{title:TITLE,cls:urgent?"warn":"",rt:"",html:`<div class="dtable">${DHEAD}<div class="drow"><div></div><div class="c ten" style="color:var(--muted);font-weight:400">${msg}</div><div></div><div></div><div></div><div></div><div></div></div></div>`}];
  }
  const htmls=pool.map((t,i)=>detailRowHTML(t,i+1));
  let pages=packByHeight(htmls);
  if(!pages||!pages.length){ // dự phòng: nếu không đo được thì chia cố định theo ROWS_PER_PAGE
    pages=[];for(let i=0;i<htmls.length;i+=CONFIG.ROWS_PER_PAGE)pages.push([...Array(Math.min(CONFIG.ROWS_PER_PAGE,htmls.length-i)).keys()].map(k=>i+k));
  }
  let extra=0;
  if(CONFIG.MAX_DETAIL_PAGES>0 && pages.length>CONFIG.MAX_DETAIL_PAGES){
    const kept=pages.slice(0,CONFIG.MAX_DETAIL_PAGES);
    kept[kept.length-1]=kept[kept.length-1].slice(0,-1);      // chừa 1 dòng cho dòng tổng kết
    const shown=kept.reduce((a,p)=>a+p.length,0);
    extra=pool.length-shown; pages=kept;
  }
  return pages.map((idxs,pi,arr)=>{
    let rows=idxs.map(i=>htmls[i]).join("");
    if(extra>0 && pi===arr.length-1)
      rows+=`<div class="drow" style="background:#fdeceb"><div></div><div class="c ten" style="color:var(--qua-tx);font-weight:800">… và ${extra} nhiệm vụ khác</div><div></div><div></div><div></div><div></div><div></div></div>`;
    return {title:TITLE,cls:urgent?"warn":"",rt:`Trang ${pi+1}/${arr.length}`,html:`<div class="dtable">${DHEAD}${rows}</div>`};
  });
}
/* Bảng xếp hạng đôn đốc: xếp Phòng theo số việc quá hạn (răn đe chung) */
function rankingHTML(list){
  const open=list.filter(t=>statusOf(t)!=="done"&&!isSecret(t.domat));
  const totQua=open.filter(t=>statusOf(t)==="qua").length;
  const totSap=open.filter(t=>statusOf(t)==="sap").length;
  const totNoHan=open.filter(t=>daysLeft(t)===null).length;
  const rows=PHONG_ORDER.map(p=>{const it=open.filter(t=>t.phong===p);
    return {p,qua:it.filter(t=>statusOf(t)==="qua").length,sap:it.filter(t=>statusOf(t)==="sap").length,open:it.length};})
    .filter(r=>r.open>0).sort((a,b)=>(b.qua-a.qua)||(b.sap-a.sap)||(b.open-a.open));
  const head=`<div class="rkrow head"><div class="rank" style="color:#fff">STT</div><div class="pn">Phòng</div><div class="m">Quá hạn</div><div class="m">Sắp đến hạn</div><div class="m">Đang mở</div></div>`;
  const body=rows.map((r,i)=>{const cls=r.qua>0?"alert":(r.sap>0?"warn":"");
    return `<div class="rkrow ${cls}"><div class="rank">${i+1}</div><div class="pn">${PHONG_TEN[r.p]||r.p}</div><div class="m q">${r.qua||"–"}</div><div class="m s">${r.sap||"–"}</div><div class="m" style="color:var(--navy)">${r.open}</div></div>`;}).join("");
  const nudge=totNoHan>0?`<div class="legend" style="margin-top:1.1vh;color:var(--qua-tx);font-weight:700">⚠ ${totNoHan} nhiệm vụ chưa khai báo thời hạn — đề nghị các Phòng bổ sung để theo dõi đúng tiến độ.</div>`:"";
  return `<div class="rkhead"><div class="box qua"><div class="lab">TỔNG QUÁ HẠN</div><div class="num">${totQua}</div></div><div class="box sap"><div class="lab">TỔNG SẮP ĐẾN HẠN</div><div class="num">${totSap}</div></div><div class="box nohan"><div class="lab">CHƯA CÓ THỜI HẠN</div><div class="num">${totNoHan}</div></div></div><div class="rktable">${head}${body||`<div class="rkrow"><div></div><div class="pn" style="color:var(--muted);font-weight:400">Không có Phòng nào có nhiệm vụ đang mở.</div><div></div><div></div><div></div></div>`}</div>${nudge}`;
}
function buildSlides(allTasks){
  const tasks=visibleTasks(allTasks);
  const hi=tasks.filter(t=>tierOf(t)==="cao");
  const nTW=hi.filter(t=>t.nguon==="TW").length,nQH=hi.filter(t=>t.nguon==="QH").length,nTTg=hi.filter(t=>t.nguon==="TTg").length,nCP=hi.filter(t=>t.nguon==="CP").length;
  const s=[];
  s.push({title:"TỔNG QUAN CHUNG",cls:"",body:`${kpiHTML(tasks)}<div class="panel"><h3>Tình hình thực hiện theo từng Phòng</h3><div class="bwrap">${barsHTML(tasks)}</div><div class="legend">${LEGEND}</div></div>`});
  s.push({title:"NHIỆM VỤ QUAN TRỌNG",cls:"prio",body:`<div class="prio-line"><span>Trung ương: ${nTW}</span><span>Quốc hội: ${nQH}</span><span>Thủ tướng Chính phủ: ${nTTg}</span><span>Chính phủ: ${nCP}</span></div>${kpiHTML(hi)}<div class="panel"><h3>Nhiệm vụ ưu tiên cao theo từng Phòng</h3><div class="bwrap">${barsHTML(hi)}</div><div class="legend">${LEGEND}</div></div>`});
  if(CONFIG.SHOW_RANKING)s.push({title:"THỐNG KÊ NHIỆM VỤ ĐẾN HẠN VÀ SẮP ĐẾN HẠN",cls:"warn",body:rankingHTML(tasks)});
  detailPages(tasks).forEach(p=>s.push({title:p.title,cls:p.cls||"",rt:p.rt,body:p.html}));
  return s;
}

/* ---- state & rotation ---- */
let TASKS=[], slides=[], cur=0, timer=null, lastFresh="";
const params=new URLSearchParams(location.search);
const noauto=params.has("noauto"), startAt=+(params.get("s")||0);
// Chế độ BÁO CÁO (cuộn dọc, cho điện thoại / gửi mọi người): thêm ?view=report vào link.
// Link mặc định (hoặc ?view=tv) = trình chiếu TV. Điện thoại mở nhầm link TV cũng tự chuyển sang báo cáo.
const _smallScreen=window.matchMedia&&window.matchMedia("(max-width:820px)").matches;
const REPORT=(params.get("view")==="report"||params.has("report"))||(params.get("view")!=="tv"&&_smallScreen);
if(REPORT){document.documentElement.classList.add("report");document.body.classList.add("report");}

function setHeader(){const d=today();
  document.getElementById("hdate").textContent=d.toLocaleDateString("vi-VN",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});
  document.getElementById("hasof").textContent="Số liệu cập nhật đến hết ngày "+d.toLocaleDateString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric"});
  const m=d.getMonth()+1,y=d.getFullYear();
  let per;
  if(CONFIG.PERIOD_MODE==="custom"&&CONFIG.PERIOD_LABEL) per=CONFIG.PERIOD_LABEL;
  else if(CONFIG.PERIOD_MODE==="quarter") per="Quý "+["I","II","III","IV"][Math.floor((m-1)/3)]+"/"+y;
  else per="Tháng "+m+"/"+y;
  document.getElementById("hper").textContent="Kỳ theo dõi: "+per;}
function renderDots(){document.getElementById("dots").innerHTML=slides.map((_,i)=>`<span class="dot ${i===cur?'on':''}"></span>`).join("");}
function show(i){
  if(!slides.length)return;
  cur=(i+slides.length)%slides.length;const st=slides[cur];
  document.getElementById("stage").innerHTML=`<div class="slide on"><div class="stitle ${st.cls}"><span class="bar"></span>${st.title}${st.rt?`<span class="rt">${st.rt}</span>`:''}</div>${st.body}</div>`;
  document.getElementById("fright").innerHTML=`<span class="fresh">${lastFresh}</span> · Màn hình ${cur+1}/${slides.length}`;
  renderDots();
  const pb=document.getElementById("pbar");pb.style.transition="none";pb.style.width="0%";
  if(!noauto){void pb.offsetWidth;pb.style.transition=`width ${CONFIG.SLIDE_SECONDS*1000}ms linear`;pb.style.width="100%";}
}
function next(){show(cur+1);}
function startRotation(){if(noauto||REPORT)return;if(timer)clearInterval(timer);timer=setInterval(next,CONFIG.SLIDE_SECONDS*1000);}

/* ---- Chế độ BÁO CÁO: một trang cuộn dọc, dạng thẻ ---- */
function reportTaskCard(t){const st=statusOf(t),dl=daysLeft(t);
  const when=st==="qua"?`Quá ${Math.abs(dl)} ngày`:(st==="sap"?(dl===0?"Hôm nay":`Còn ${dl} ngày`):(t._han?t._han.toLocaleDateString("vi-VN"):"—"));
  const ccls=st==="qua"?"":(st==="sap"?"sap":"con");   // quá hạn = đỏ · sắp = cam · còn hạn = trung tính
  return `<div class="card ${ccls}"><div class="tt">${t.ten}</div>`+
    `<div class="meta"><span>Phòng: <b>${t.phong}</b></span><span>PCT phụ trách: <b>${t.ldcuc||"—"}</b></span><span>Thời hạn: <b>${t._han?t._han.toLocaleDateString("vi-VN"):"—"}</b></span></div>`+
    `<div class="chips"><span class="src b-${t.nguon}">${(NGUON[t.nguon]||{}).ten||t.nguon}</span><span class="st stbadge st-${st}">${LABELS[st]} · ${when}</span></div></div>`;}
function noAccent(s){return (""+(s||"")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\u0111/g,"d");}
let RF={phong:"",ldc:"",status:"all",q:""}, reportShell=false;
const RF_CAP=100;
function buildReportShell(){
  const phOpts=`<option value="">Tất cả Phòng</option>`+PHONG_ORDER.map(p=>`<option value="${p}">${PHONG_TEN[p]||p}</option>`).join("");
  const ldcSet=[...new Set(visibleTasks(TASKS).map(t=>t.ldcuc).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"vi"));
  const ldcOpts=`<option value="">Tất cả Lãnh đạo Cục</option>`+ldcSet.map(n=>`<option value="${n}">${n}</option>`).join("");
  const stChips=[["all","Tất cả"],["qua","Quá hạn"],["sap","Sắp đến hạn"],["con","Còn hạn"],["done","Hoàn thành"]]
    .map(a=>`<button class="fchip ${RF.status===a[0]?'on':''}" data-st="${a[0]}">${a[1]}</button>`).join("");
  document.getElementById("stage").innerHTML=`<div class="rp">`+
    `<div class="fbar"><div class="frow"><select id="fPhong">${phOpts}</select><select id="fLdc">${ldcOpts}</select></div>`+
    `<div class="chips2" id="fStatus">${stChips}</div>`+
    `<input id="fSearch" type="search" placeholder="Tìm theo tên nhiệm vụ…" value="${RF.q}"></div>`+
    `<div id="rpBody"></div></div>`;
  const g=id=>document.getElementById(id);
  g("fPhong").value=RF.phong; g("fLdc").value=RF.ldc;
  g("fPhong").addEventListener("change",e=>{RF.phong=e.target.value;applyReportFilters();});
  g("fLdc").addEventListener("change",e=>{RF.ldc=e.target.value;applyReportFilters();});
  g("fSearch").addEventListener("input",e=>{RF.q=e.target.value;applyReportFilters();});
  g("fStatus").addEventListener("click",e=>{const b=e.target.closest(".fchip");if(!b)return;RF.status=b.dataset.st;
    [...g("fStatus").children].forEach(c=>c.classList.toggle("on",c.dataset.st===RF.status));applyReportFilters();});
}
function applyReportFilters(){
  let base=visibleTasks(TASKS);
  if(RF.phong)base=base.filter(t=>t.phong===RF.phong);
  if(RF.ldc)base=base.filter(t=>t.ldcuc===RF.ldc);
  const c=counts(base),total=base.length,rate=total?Math.round(c.done/total*100):0;
  const noHan=base.filter(t=>statusOf(t)!=="done"&&daysLeft(t)===null).length;   // chưa điền thời hạn
  const kpi=`<div class="kpis2">`+
    `<div class="k total"><div class="lab">TỔNG NHIỆM VỤ</div><div class="num">${total}</div></div>`+
    `<div class="k done"><div class="lab">HOÀN THÀNH</div><div class="num">${c.done} · ${rate}%</div></div>`+
    `<div class="k qua"><div class="lab">QUÁ HẠN</div><div class="num">${c.qua}</div></div>`+
    `<div class="k sap"><div class="lab">SẮP ĐẾN HẠN</div><div class="num">${c.sap}</div></div>`+
    `<div class="k con"><div class="lab">CÒN HẠN</div><div class="num">${c.con}</div></div>`+
    `<div class="k nohan"><div class="lab">CHƯA ĐIỀN HẠN</div><div class="num">${noHan}</div></div></div>`;
  // Xếp hạng theo Phòng — chỉ hiện khi KHÔNG lọc riêng một Phòng
  let rankHTML="";
  if(!RF.phong){
    const open=base.filter(t=>statusOf(t)!=="done");
    const rk=PHONG_ORDER.map(p=>{const it=open.filter(t=>t.phong===p);return {p,qua:it.filter(t=>statusOf(t)==="qua").length,sap:it.filter(t=>statusOf(t)==="sap").length,open:it.length};})
      .filter(r=>r.open>0).sort((a,b)=>(b.qua-a.qua)||(b.sap-a.sap)||(b.open-a.open));
    if(rk.length>1){
      rankHTML=`<h2 class="warn"><span class="bar"></span>Xếp hạng đôn đốc theo Phòng</h2>`+
        `<div class="rhd"><div></div><div>Phòng</div><div class="m">Quá</div><div class="m">Sắp</div></div>`+
        rk.map((r,i)=>`<div class="rrow ${r.qua>0?'alert':(r.sap>0?'warn':'')}"><div class="rk">${i+1}</div><div class="pn">${PHONG_TEN[r.p]||r.p}</div><div class="m q">${r.qua||"–"}</div><div class="m s">${r.sap||"–"}</div></div>`).join("");
    }
  }
  // Danh sách theo trạng thái + tìm kiếm (bản điện thoại phục vụ tra cứu → hiện TẤT CẢ: cả việc mật, cả nguồn Phối hợp, để khớp với ô đếm)
  let pool=[...base];
  const st=RF.status;
  if(st==="done")pool=pool.filter(t=>statusOf(t)==="done");
  else if(st==="qua")pool=pool.filter(t=>statusOf(t)==="qua");
  else if(st==="sap")pool=pool.filter(t=>statusOf(t)==="sap");
  else if(st==="con")pool=pool.filter(t=>statusOf(t)==="con");
  // "all" = tất cả nhiệm vụ (gồm cả đã hoàn thành trong kỳ)
  if(RF.q){const q=noAccent(RF.q);pool=pool.filter(t=>noAccent(t.ten).includes(q));}
  pool.sort((a,b)=>(STORDER[statusOf(a)]-STORDER[statusOf(b)])||(TIER_RANK[tierOf(a)]-TIER_RANK[tierOf(b)])||((daysLeft(a)??9999)-(daysLeft(b)??9999)));
  const extra=Math.max(0,pool.length-RF_CAP);
  const cards=pool.length?pool.slice(0,RF_CAP).map(reportTaskCard).join("")+(extra>0?`<div class="note">… và ${extra} nhiệm vụ khác (thu hẹp bộ lọc để xem tiếp).</div>`:""):`<div class="empty">Không có nhiệm vụ phù hợp bộ lọc.</div>`;
  const searching=RF.q.trim().length>0;   // đang tìm kiếm thì hiện thẳng kết quả, ẩn phần tóm tắt
  document.getElementById("rpBody").innerHTML=(searching?"":kpi+rankHTML)+`<h2 class="warn"><span class="bar"></span>Danh sách nhiệm vụ</h2><div class="cnt">${pool.length} nhiệm vụ · ${lastFresh}</div>${cards}`;
}
function renderReport(){ if(!reportShell){buildReportShell();reportShell=true;} applyReportFilters(); }

async function loadData(first){
  try{
    const url=CONFIG.DATA_URL+(CONFIG.DATA_URL.includes("?")?"&":"?")+"_="+Date.now();
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const raw=await res.text();
    let tasks=[];
    const trimmed=raw.trim();
    if(trimmed.startsWith("[")||trimmed.startsWith("{")){tasks=jsonToTasks(JSON.parse(trimmed));}
    else{tasks=rowsToTasks(parseCSV(raw));}
    if(!tasks.length)throw new Error("Không có dữ liệu");
    TASKS=tasks;
    const now=new Date();
    lastFresh="Cập nhật lúc "+now.toLocaleTimeString("vi-VN",{hour:"2-digit",minute:"2-digit"});
    setHeader();
    if(REPORT){ renderReport(TASKS); return; }
    const keep=cur; slides=buildSlides(TASKS);
    if(first){show(startAt);startRotation();}
    else{ if(keep>=slides.length)cur=0; /* giữ nguyên trang đang chiếu, dữ liệu mới áp dụng ở vòng sau */ }
  }catch(e){
    if(first){document.getElementById("msg").innerHTML=`Chưa đọc được dữ liệu.<div class="sp">Kiểm tra đường dẫn dữ liệu trong phần CẤU HÌNH (DATA_URL).<br>Chi tiết: ${e.message}</div>`;}
  }
}
document.addEventListener("keydown",e=>{if(REPORT)return;if(e.key==="ArrowRight"){next();startRotation();}if(e.key==="ArrowLeft"){show(cur-1);startRotation();}});
document.addEventListener("click",()=>{if(REPORT||noauto)return;next();startRotation();});

setHeader();
loadData(true);
setInterval(()=>loadData(false), Math.max(1,CONFIG.REFRESH_MINUTES)*60000);
setInterval(setHeader, 60000);

</script>
</body>
